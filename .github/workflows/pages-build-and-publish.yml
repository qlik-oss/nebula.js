name: Build And Publish Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn run build

      - name: Prepare Pages content
        run: |
          mkdir -p gh-pages

          # Publish npm-installable tarballs for all public @nebula.js packages.
          node << 'EOF'
          const fs = require('node:fs');
          const path = require('node:path');
          const cp = require('node:child_process');

          const roots = ['apis', 'commands', 'packages'];
          const outRoot = 'gh-pages/npm';
          const branchRef = (process.env.GITHUB_REF_NAME || 'integration').replace(/[^A-Za-z0-9._-]/g, '-');
          const branchRoot = path.join(outRoot, 'branches', branchRef);
          fs.mkdirSync(outRoot, { recursive: true });
          fs.mkdirSync(branchRoot, { recursive: true });

          const manifest = {
            generatedAt: new Date().toISOString(),
            packages: {}
          };

          for (const root of roots) {
            if (!fs.existsSync(root)) continue;

            for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
              if (!entry.isDirectory()) continue;

              const pkgDir = path.join(root, entry.name);
              const pkgJsonPath = path.join(pkgDir, 'package.json');
              if (!fs.existsSync(pkgJsonPath)) continue;

              const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, 'utf8'));
              if (pkg.private || !pkg.name || !pkg.version) continue;
              if (!pkg.name.startsWith('@nebula.js/')) continue;

              const [scope, name] = pkg.name.split('/');
              const safeScope = scope.replace(/^@/, '');
              const targetDir = path.join(outRoot, safeScope, name, pkg.version);
              fs.mkdirSync(targetDir, { recursive: true });

              const packOutput = cp.execSync('npm pack --silent', {
                cwd: pkgDir,
                encoding: 'utf8'
              });
              const tgzName = packOutput.trim().split('\n').pop();
              const sourceTgz = path.join(pkgDir, tgzName);
              const targetTgz = path.join(targetDir, 'package.tgz');
              fs.renameSync(sourceTgz, targetTgz);

              const branchPkgDir = path.join(branchRoot, safeScope, name);
              fs.mkdirSync(branchPkgDir, { recursive: true });
              const branchTargetTgz = path.join(branchPkgDir, 'package.tgz');
              fs.copyFileSync(targetTgz, branchTargetTgz);

              manifest.packages[pkg.name] = {
                version: pkg.version,
                path: `npm/${safeScope}/${name}/${pkg.version}/package.tgz`,
                branchPath: `npm/branches/${branchRef}/${safeScope}/${name}/package.tgz`
              };
            }
          }

          fs.writeFileSync(
            path.join(outRoot, 'manifest.json'),
            JSON.stringify(manifest, null, 2)
          );

          fs.writeFileSync(
            path.join(branchRoot, 'manifest.json'),
            JSON.stringify(manifest, null, 2)
          );
          EOF

          rsync -a --prune-empty-dirs \
            --include='*/' \
            --include='dist/***' \
            --include='lib/***' \
            --exclude='*' \
            apis commands packages gh-pages/

          cat > gh-pages/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>nebula.js Build Artifacts</title>
            <style>
              :root {
                color-scheme: light dark;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }
              body {
                margin: 2rem;
                line-height: 1.5;
              }
              h1 {
                margin-bottom: 0.5rem;
              }
              ul {
                padding-left: 1.2rem;
              }
            </style>
          </head>
          <body>
            <h1>nebula.js Build Artifacts</h1>
            <p>This site is generated by GitHub Actions from package build outputs.</p>
            <ul>
              <li><a href="npm/manifest.json">npm/manifest.json</a> (installable package tarball index)</li>
              <li><a href="npm/branches/">npm/branches/</a> (branch-stable integration tarballs)</li>
          EOF

          while IFS= read -r dir; do
            rel="${dir#gh-pages/}"
            if [ "$rel" != "$dir" ]; then
              echo "<li><a href=\"$rel/\">$rel/</a></li>" >> gh-pages/index.html
            fi
          done < <(find gh-pages -type d \( -name dist -o -name lib \) | sort)

          cat >> gh-pages/index.html << 'EOF'
            </ul>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: gh-pages

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
