name: Build And Publish Pages

on:
  push:
    branches:
      - alpha/v7
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn run build

      - name: Prepare Pages content
        run: |
          mkdir -p gh-pages
          rsync -a --prune-empty-dirs \
            --include='*/' \
            --include='dist/***' \
            --include='lib/***' \
            --exclude='*' \
            apis commands packages gh-pages/

          cat > gh-pages/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>nebula.js Build Artifacts</title>
            <style>
              :root {
                color-scheme: light dark;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }
              body {
                margin: 2rem;
                line-height: 1.5;
              }
              h1 {
                margin-bottom: 0.5rem;
              }
              ul {
                padding-left: 1.2rem;
              }
            </style>
          </head>
          <body>
            <h1>nebula.js Build Artifacts</h1>
            <p>This site is generated by GitHub Actions from package build outputs.</p>
            <ul>
          EOF

          while IFS= read -r dir; do
            rel="${dir#gh-pages/}"
            if [ "$rel" != "$dir" ]; then
              echo "<li><a href=\"$rel/\">$rel/</a></li>" >> gh-pages/index.html
            fi
          done < <(find gh-pages -type d \( -name dist -o -name lib \) | sort)

          cat >> gh-pages/index.html << 'EOF'
            </ul>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

  deploy:
    if: github.ref == 'refs/heads/alpha/v7'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
